name: Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout nexus source
        uses: actions/checkout@v4
        with:
          repository: Deadworks-net/deadworks
          path: nexus

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus/launcher/src-tauri

      - name: Install dependencies
        working-directory: nexus/launcher
        run: bun install

      # Branch pushes: build only (no bundle, no release)
      - name: Build (no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: nexus/launcher
        run: bun tauri build --no-bundle

      # Tag pushes: full signed build + GitHub Release
      - name: Build signed bundle
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: nexus/launcher
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun tauri build

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Deadworks Launcher ${{ github.ref_name }}
          body: |
            ## Deadworks Launcher ${{ github.ref_name }}

            Download the `.exe` installer below.
          files: |
            nexus/launcher/src-tauri/target/release/bundle/nsis/*.exe
            nexus/launcher/src-tauri/target/release/bundle/nsis/*.exe.sig
